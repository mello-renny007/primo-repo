<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OG Image</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1200px;
  height: 630px;
  overflow: hidden;
  background: #0d0d0d;
  font-family: 'DM Sans', sans-serif;
}
.container {
  width: 1200px;
  height: 630px;
  background: #0d0d0d;
  padding: 64px 80px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.top {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.byline-top {
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #3a3a3a;
  margin-bottom: 10px;
  font-weight: 400;
}
.rule-top {
  width: 220px;
  height: 1px;
  background: #222;
  margin-bottom: 0;
}
.middle {
  flex: 1;
  display: flex;
  align-items: center;
}
.title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 76px;
  font-weight: 400;
  color: #e8e4dc;
  line-height: 1.1;
  letter-spacing: -0.01em;
  max-width: 960px;
}
.bottom {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.rule-bottom {
  width: 40px;
  height: 1px;
  background: #2a2a2a;
  margin-bottom: 14px;
}
.subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-style: italic;
  color: #444;
  margin-bottom: 6px;
  font-weight: 400;
}
.byline-bottom {
  font-size: 13px;
  color: #333;
  font-weight: 300;
  margin-bottom: 28px;
}
.domain {
  font-size: 12px;
  letter-spacing: 0.06em;
  color: #2a2a2a;
  font-weight: 300;
}
</style>
</head>
<body>
<div class="container">
  <div class="top">
    <div class="byline-top">Renata Aguilar</div>
    <div class="rule-top"></div>
  </div>
  <div class="middle">
    <h1 class="title">What Building an AI Product Actually Taught Me About AI</h1>
  </div>
  <div class="bottom">
    <div class="rule-bottom"></div>
    <div class="subtitle">The lessons nobody posts about — from someone who started over.</div>
    <div class="byline-bottom">by Renata Aguilar</div>
    <div class="domain">renataaguilar.company</div>
  </div>
</div>
</body>
</html>
